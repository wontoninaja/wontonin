<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kontak - Wontonin</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
                }
            }
        </script>
        <style>
            /* SOSMED ICON */
            .sosmed-icon {
                width: 70px;
                height: 70px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 15px auto;
                font-size: 2rem;
                color: white;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                transition: 0.3s;
            }
            .contact-card:hover .sosmed-icon {
                transform: scale(1.15);
                box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            }
            .contact-card h3 {
                color: var(--color-text);
                margin-bottom: 8px;
            }
            .contact-card p {
                color: #555;
                font-size: 14px;
            }
        </style>
    </head>
    <body>
        <!-- NAVBAR -->
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="btn-back">Kembali ke Menu</a>
            </div>
        </nav>

        <!-- HEADER -->
        <section class="contact-header">
            <h1>Hubungi Kami</h1>
            <p>Kami siap melayani pesanan Anda</p>
        </section>

        <!-- CONTACT CONTENT -->
        <section class="contact-section">
            <div class="contact-grid">

                <!-- WHATSAPP -->
                <div class="contact-card">
                    <div class="sosmed-icon" style="background: #25D366;">
                        <i class="fa-brands fa-whatsapp"></i>
                    </div>
                    <h3>WhatsApp</h3>
                    <p>Hubungi kami langsung melalui WhatsApp.</p>
                    <a href="https://wa.me/628132524282?text=" target="_blank" class="contact-btn">
                        Chat WhatsApp
                    </a>
                </div>

                <!-- INSTAGRAM -->
                <div class="contact-card">
                    <div class="sosmed-icon" style="background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);">
                        <i class="fa-brands fa-instagram"></i>
                    </div>
                    <h3>Instagram</h3>
                    <p>Lihat update produk terbaru kami.</p>
                    <a href="https://www.instagram.com/_wontonin.aja_" target="_blank" class="contact-btn">
                        Kunjungi Instagram
                    </a>
                </div>

                <!-- TELEGRAM -->
                <div class="contact-card">
                    <div class="sosmed-icon" style="background: #229ED9;">
                        <i class="fa-brands fa-telegram"></i>
                    </div>
                    <h3>Telegram</h3>
                    <p>Hubungi kami melalui Telegram.</p>
                    <a href="https://t.me/wontoninaja" target="_blank" class="contact-btn">
                        Buka Telegram
                    </a>
                </div>

            </div>
        </section>

        <!-- GOOGLE MAP -->
        <section class="map-section">
            <h2>📍 Lokasi Kami</h2>
            <div class="map-frame">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d989.5153895406007!2d112.76694372848927!3d-7.233819399546388!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2dd7f9a8c3d9ecfb%3A0xf26a8b2de0974fa1!2sJl.%20Pogot%20IX%20No.52%2C%20RT.012%2FRW.05%2C%20Tanah%20Kali%20Kedinding%2C%20Kec.%20Kenjeran%2C%20Surabaya%2C%20Jawa%20Timur%2060129!5e0!3m2!1sid!2sid!4v1776089853550!5m2!1sid!2sid"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
                <p class="map-address">Jl. Pogot IX No 52</p>
            </div>
        </section>

        <script src="electric.js"></script>
    </body>
</html>
